<!-- Add this to your base template, preferably before the closing </body> tag -->

<!-- ✅ THIS BUTTON TRIGGERS THE MODAL -->
                    <button class="logout-btn text-red-500 hover:text-red-700 transition duration-200 flex items-center space-x-1">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                        <span>Logout</span>
                    </button>

<div id="logoutModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50 hidden transition-opacity duration-300">
    <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-lg bg-white">
        <div class="mt-3 text-center">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100">
                <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
            </div>
            <h3 class="text-lg font-medium text-gray-900 mt-4">Logout Confirmation</h3>
            <div class="mt-2 px-7 py-3">
                <p class="text-sm text-gray-500">Are you sure you want to logout? You will need to login again to access your account.</p>
            </div>
            <div class="flex justify-center gap-3 mt-4">
                <button id="cancelLogoutBtn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded hover:bg-gray-300 transition duration-200">
                    Cancel
                </button>
                <form method="post" action="{% url 'logout' %}" class="inline">
                    {% csrf_token %}
                    <button type="submit" id="confirmLogoutBtn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition duration-200">
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Logout modal functionality
    const logoutModal = document.getElementById('logoutModal');
    let logoutTriggerBtn = null;

    // Function to show modal
    function showLogoutModal() {
        if (logoutModal) {
            logoutModal.classList.remove('hidden');
            // Add animation
            logoutModal.classList.add('transition-opacity', 'duration-300');
        }
    }

    // Function to hide modal
    function hideLogoutModal() {
        if (logoutModal) {
            logoutModal.classList.add('hidden');
        }
    }

    // Close modal when clicking outside
    if (logoutModal) {
        logoutModal.addEventListener('click', function(e) {
            if (e.target === logoutModal) {
                hideLogoutModal();
            }
        });
    }

    // Cancel button
    const cancelBtn = document.getElementById('cancelLogoutBtn');
    if (cancelBtn) {
        cancelBtn.addEventListener('click', hideLogoutModal);
    }

    // Find all logout buttons and attach click handlers
    document.addEventListener('DOMContentLoaded', function() {
        const logoutButtons = document.querySelectorAll('.logout-btn');
        logoutButtons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                showLogoutModal();
            });
        });
    });
</script>
