{% extends 'core/base.html' %}

{% block content %}

<div class="max-w-lg h-screen mx-auto rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6">Update Wallet</h2>
    <br>
    <form method="POST" class="space-y-6">
        <p class="text-sm mt-4 px-3 py-4 bg-warning text-black"><strong>Note</strong>: Be cautious when adjusting balances.
    </p>

    {% csrf_token %}

    {{ form.as_p }}

    <div>
            <button type="submit" id="depositButton"
                class="w-full flex justify-center items-center py-2 px-4 border border-transparent rounded-0 shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-200 transform hover:scale-[1.02] disabled:opacity-70 disabled:cursor-not-allowed disabled:hover:scale-100">

                <span class="btn-text">Update wallet</span>

                

            </button>
        </div>

</form>

</div>



{% endblock %}
