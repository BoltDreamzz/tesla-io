<style>
    .activity-feed-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 340px;
        z-index: 9999;
    }

    .activity-card {
        position: absolute;
        left: 0;
        right: 0;

        cursor: pointer;

        padding: 16px;

        border-radius: 24px;

        background: rgba(255, 255, 255, 0.08);

        backdrop-filter: blur(20px);

        -webkit-backdrop-filter: blur(20px);

        border: 1px solid rgba(255, 255, 255, 0.12);

        box-shadow:
            0 10px 40px rgba(0, 0, 0, .25);

        transition:
            transform .35s ease,
            opacity .35s ease,
            height .35s ease;
        animation: slideIn .5s cubic-bezier(.16, 1, .3, 1);

    }

    .activity-card:hover {
        transform: translateY(-4px);
    }

    .activity-card.expanded {
        min-height: 120px;
        width: 60vw;
    }

    .activity-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .activity-left {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .activity-icon {
        font-size: 28px;
    }

    .activity-title {
        font-size: 15px;
        font-weight: 700;
        color: white;
    }

    .activity-message {
        font-size: 13px;
        color: rgba(255, 255, 255, .75);
    }

    .close-btn {
        border: none;
        background: none;
        color: white;
        cursor: pointer;
        font-size: 16px;
    }

    .activity-body {
        margin-top: 14px;
    }

    .activity-tag {
        display: inline-block;

        padding: 5px 10px;

        border-radius: 999px;

        background: rgba(255, 255, 255, .1);

        color: white;

        font-size: 12px;
    }

    .activity-time {
        margin-top: 10px;
        color: rgba(255, 255, 255, .6);
        font-size: 12px;
    }

    @keyframes slideIn {

        from {
            transform:
                translateX(120%);
            opacity: 0;
        }

        to {
            transform:
                translateX(0);
            opacity: 1;
        }

    }

    .activity-card {
        animation:
            slideIn .5s ease forwards;
    }
</style>

<div id="activity-feed-root">

</div>
