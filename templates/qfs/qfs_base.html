<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QFS — Enterprise-Grade Cryptocurrency Security</title>
    <meta name="description"
        content="QFS provides enterprise-grade protection and monitoring for digital assets. Advanced encryption, multi-signature wallets, real-time monitoring, fraud detection, and instant alerts." />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>



    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0F172A',
                        primary: '#2563EB',
                        emerald: '#10B981'
                    },
                    boxShadow: {
                        glow: '0 0 0 1px rgba(37,99,235,0.15), 0 10px 30px rgba(2,6,23,0.45)',
                        'inner-emerald': 'inset 0 0 0 1px rgba(16,185,129,0.35)',
                    },
                    backgroundImage: {
                        'radial-fade': 'radial-gradient(60rem 60rem at 80% -10%, rgba(37,99,235,0.25), rgba(16,185,129,0.15) 45%, rgba(15,23,42,0) 70%)',
                        'grid': 'linear-gradient(to right, rgba(148,163,184,0.10) 1px, transparent 1px), linear-gradient(to bottom, rgba(148,163,184,0.10) 1px, transparent 1px)'
                    },
                    backgroundSize: {
                        grid: '28px 28px'
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in {
            animation: fadeIn 0.6s ease-out both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="antialiased text-slate-200 bg-navy selection:bg-primary/30 selection:text-white">
    {% block content %}
    {% endblock %}

    <script>
        // Accessibility & small niceties
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
