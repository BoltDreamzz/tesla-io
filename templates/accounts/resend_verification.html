{% extends 'core/base.html' %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h2 class="text-2xl font-bold mb-6 text-center">Resend Verification Email</h2>
        
        <p class="text-gray-600 mb-6 text-center">
            Enter your email address and we'll send you a new verification link.
        </p>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" 
                    class="w-full bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 mt-4">
                Send Verification Email
            </button>
        </form>
        
        <div class="mt-4 text-center">
            <a href="{% url 'login' %}" class="text-blue-600 hover:underline">
                Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
